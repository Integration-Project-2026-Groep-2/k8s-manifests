# ─── HTTPRoute: Headlamp ──────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headlamp-route
spec:
  parentRefs:
    - name: main-gateway
      sectionName: https
  hostnames:
    - "k8s.integration-project-2026-groep-2.my.be"
  rules:
    - backendRefs:
        - name: headlamp
          namespace: headlamp
          port: 80