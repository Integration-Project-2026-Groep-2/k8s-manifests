# Helm values for NGINX Gateway Fabric
# Gateway API is the modern replacement for Ingress
# Install with:
#   kubectl kustomize "https://github.com/nginx/nginx-gateway-fabric/config/crd/gateway-api/standard?ref=v2.5.1" | kubectl apply -f -
#   helm install ngf oci://ghcr.io/nginx/charts/nginx-gateway-fabric \
#     -n nginx-gateway --create-namespace \
#     -f gateway/gateway-controller-values.yaml

controller:
  kind: Deployment
  
  service:
    type: NodePort
    nodePorts:
      https: 30097    # Single entrypoint for all traffic (Cloudflare routes here)
  
  # Configuration for NGINX
  config:
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
    use-proxy-protocol: "false"
    
    # Trust Cloudflare IP ranges as proxy (Cloudflare will add X-Forwarded-For)
    proxy-real-ip-cidr: "103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,104.16.0.0/13,104.24.0.0/14,108.162.192.0/18,131.0.72.0/22,141.101.64.0/18,162.158.0.0/15,172.64.0.0/13,173.245.48.0/20,188.114.96.0/20,190.93.240.0/20,197.234.240.0/22,198.41.128.0/17"
    
    # Client IP will be correctly seen from your applications
    map-hash-bucket-size: "128"

  # Resource limits for the gateway controller
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Metrics for monitoring
  metrics:
    enabled: true
    port: 9113

  # Pod security
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101

  # Replica count for high availability
  replicas: 1

# Gateway API class configuration
gatewayClass:
  name: nginx

# Webhook for Gateway API validation
webhookServer:
  enabled: true
