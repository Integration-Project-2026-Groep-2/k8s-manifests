# NGINX Gateway Fabric Helm Chart Values
# Exposes the gateway service on port 30097 (NodePort)

nginxGateway:
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enable: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - nginx-gateway-fabric
            topologyKey: kubernetes.io/hostname

nginx:
  pod:
    hostNetwork: true
    dnsPolicy: ClusterFirstWithHostNet
  service:
    type: NodePort
    externalTrafficPolicy: Local
    nodePorts:
      - port: 30097
        listenerPort: 443
