# ─── HTTPRoute: ArgoCD ──────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-route
  namespace: argocd
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
      sectionName: https
  hostnames:
    - "argocd"
  rules:
    - backendRefs:
        - name: argocd-server
          namespace: argocd
          port: 80