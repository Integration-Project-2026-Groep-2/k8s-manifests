apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-gateway
  namespace: nginx-gateway
spec:
  gatewayClassName: nginx
  listeners:
    - name: https
      protocol: HTTPS
      port: 30097
      tls:
        mode: Terminate
        certificateRefs:
          - name: main-gateway-cert
            kind: Secret
        options:
          nginx.org/ssl-protocols: "TLSv1.2 TLSv1.3"
          nginx.org/ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
          nginx.org/ssl-prefer-server-ciphers: "on"
      allowedRoutes:
        namespaces:
          from: All