apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-gateway
  namespace: main-gateway
spec:
  gatewayClassName: nginx
  listeners:
    - name: https
      protocol: HTTPS
      port: 30097
      tls:
        mode: Terminate
        certificateRefs:
          - name: main-gateway-cert
            kind: Secret
      allowedRoutes:
        namespaces:
          from: All