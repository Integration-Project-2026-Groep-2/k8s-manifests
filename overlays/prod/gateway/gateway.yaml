# Kubernetes Gateway API - Production Environment
# Prod-specific Gateway and HTTPRoutes with prod domain routing

---
# ── Gateway (Prod Entrypoint - HTTPS only with Cloudflare Origin Cert) ──────
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: prod-gateway
spec:
  gatewayClassName: nginx
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: cloudflare-origin-cert
            kind: Secret

---
# ─── HTTPRoute: Main website (Drupal) ──────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: frontend-route
spec:
  parentRefs:
    - name: prod-gateway
      sectionName: https
  hostnames:
    - integration-project-2026-groep-2.my.be
    - www.integration-project-2026-groep-2.my.be
  rules:
    - backendRefs:
        - name: frontend-drupal
          port: 80

---
# ─── HTTPRoute: RabbitMQ Management UI ────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
