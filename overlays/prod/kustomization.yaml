apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ── Base ─────────────────────────────────────────────────────────────────────
resources:
  - ../../base          # root kustomization (apps, gateway, infrastructure, …)
  - httproute.yaml  # prod-specific routes
  - filters/        # prod-specific filters (e.g. auth)

# ── Namespace override ────────────────────────────────────────────────────────
namespace: integration-project-2026-groep-2-prod

# ── Common labels / annotations ───────────────────────────────────────────────
commonLabels:
  environment: prod

commonAnnotations:
  environment: prod
  managed-by: argocd

# ── Image tags ────────────────────────────────────────────────────────────────
images:
  - name: ghcr.io/integration-project-2026-groep-2/controlroom
    newTag: 1.0.0
  - name: ghcr.io/integration-project-2026-groep-2/frontend
    newTag: 1.0.0
  - name: ghcr.io/integration-project-2026-groep-2/facturatie
    newTag: 1.0.0
  - name: ghcr.io/integration-project-2026-groep-2/planning
    newTag: 1.0.0
  - name: ghcr.io/integration-project-2026-groep-2/crm
    newTag: 1.0.0
  - name: ghcr.io/integration-project-2026-groep-2/kassa
    newTag: 1.0.0
  - name: ghcr.io/integration-project-2026-groep-2/mailing
    newTag: 1.0.0
  - name: ghcr.io/integration-project-2026-groep-2/mcp-master
    newTag: 1.0.0
  - name: ghcr.io/integration-project-2026-groep-2/iot-badge-scanner
    newTag: 1.0.0

# ── Patches ───────────────────────────────────────────────────────────────────
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment

  # Tighter resource requests/limits for predictable scheduling in prod
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "1000m"
            memory: "512Mi"
    target:
      kind: Deployment
      labelSelector: app in (frontend,facturatie,crm,controlroom,kassa,mailing,planning)

  # Enable pod disruption budget awareness: prefer spreading across nodes
  - patch: |-
      - op: add
        path: /spec/template/spec/topologySpreadConstraints
        value:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                environment: prod
    target:
      kind: Deployment

  - patch: |-
      - op: replace
        path: /spec/config/server.publicBaseUrl
        value: "https://dev-control-room.integration-project-2026-groep-2.my.be"
    target:
      kind: Kibana