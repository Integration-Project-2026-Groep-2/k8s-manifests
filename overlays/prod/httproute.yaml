# Kubernetes Gateway API - Production Environment
# Prod-specific HTTPRoutes with prod domain routing

---
# ─── HTTPRoute: Main website (Drupal) ──────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: frontend-route
spec:
  parentRefs:
    - name: main-gateway
      namespace: main-gateway
      sectionName: https
  hostnames:
    - integration-project-2026-groep-2.my.be
    - www.integration-project-2026-groep-2.my.be
  rules:
    - backendRefs:
        - name: frontend
          port: 80

---
# ─── HTTPRoute: RabbitMQ Management UI ────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: rabbitmq-route
spec:
  parentRefs:
    - name: main-gateway
      namespace: main-gateway
      sectionName: https
  hostnames:
    - rabbitmq.integration-project-2026-groep-2.my.be
  rules:
    - backendRefs:
        - name: rabbitmq
          port: 15672

---
# ─── HTTPRoute: Billing / Facturatie ──────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: billing-route
  annotations:
    nginx.gateway.networking.k8s.io/auth-type: basic
    nginx.gateway.networking.k8s.io/auth-secret: htpasswd-facturatie
    nginx.gateway.networking.k8s.io/auth-realm: "Facturatie Access"
spec:
  parentRefs:
    - name: main-gateway
      namespace: main-gateway
      sectionName: https
  hostnames:
    - facturatie.integration-project-2026-groep-2.my.be
  rules:
    - backendRefs:
        - name: billing-app
          port: 80

