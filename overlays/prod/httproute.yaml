# Kubernetes Gateway API - Production Environment
# Prod-specific HTTPRoutes with prod domain routing

---
# ─── HTTPRoute: Main website (Drupal) ──────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: frontend-route
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
      sectionName: https
  hostnames:
    - "integration-project-2026-groep-2.my.be"
    - "www.integration-project-2026-groep-2.my.be"
  rules:
    - backendRefs:
        - name: frontend
          port: 80

---
# ─── HTTPRoute: RabbitMQ Management UI ────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: rabbitmq-route
  annotations:
    argocd.argoproj.io/sync-wave: "2"  # Sync after RabbitMQ is created, so the service exists
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
      sectionName: https
  hostnames:
    - "rabbitmq.integration-project-2026-groep-2.my.be"
  rules:
    - backendRefs:
        - name: rabbitmq
          port: 15672

---
# ─── HTTPRoute: Billing / Facturatie ──────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: billing-route
  annotations:
    nginx.gateway.networking.k8s.io/auth-type: basic
    nginx.gateway.networking.k8s.io/auth-secret: htpasswd-facturatie
    nginx.gateway.networking.k8s.io/auth-realm: "Facturatie Access"
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
      sectionName: https
  hostnames:
    - "facturatie.integration-project-2026-groep-2.my.be"
  rules:
    - backendRefs:
        - name: facturatie
          port: 80
      filters:
      - type: ExtensionRef
        extensionRef:
          group: gateway.nginx.org
          kind: AuthenticationFilter
          name: facturatie-auth

