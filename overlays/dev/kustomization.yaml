apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ── Base ─────────────────────────────────────────────────────────────────────
resources:
  - ../../base          # root kustomization (apps, gateway, infrastructure, …)
  - httproute.yaml  # dev-specific routes

# ── Namespace override ────────────────────────────────────────────────────────
namespace: integration-project-2026-groep-2-dev

# ── Common labels / annotations ───────────────────────────────────────────────
commonLabels:
  environment: dev

commonAnnotations:
  environment: dev
  managed-by: argocd

# ── Image tags ────────────────────────────────────────────────────────────────
images:
  - name: ghcr.io/integration-project-2026-groep-2/controlroom
    newTag: latest-dev
  - name: ghcr.io/integration-project-2026-groep-2/frontend
    newTag: latest-dev
  - name: ghcr.io/integration-project-2026-groep-2/facturatie
    newTag: latest-dev
  - name: ghcr.io/integration-project-2026-groep-2/planning
    newTag: latest-dev
  - name: ghcr.io/integration-project-2026-groep-2/crm
    newTag: latest-dev
  - name: ghcr.io/integration-project-2026-groep-2/kassa
    newTag: latest-dev
  - name: ghcr.io/integration-project-2026-groep-2/mailing
    newTag: latest-dev

# ── Patches ───────────────────────────────────────────────────────────────────
patches:
  # Scale every Deployment down to 1 replica in dev
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment

  # Relax resource limits in dev so the cluster isn't starved
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
    target:
      kind: Deployment
      labelSelector: app in (frontend,facturatie,crm,controlroom,kassa,mailing,planning)