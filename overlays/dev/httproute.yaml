# Kubernetes Gateway API - Development Environment
# Dev-specific HTTPRoutes with dev subdomain routing

---
# ─── HTTPRoute: Main website (Drupal) ──────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
      sectionName: https
  hostnames:
    - "dev.integration-project-2026-groep-2.my.be"
    - "dev-www.integration-project-2026-groep-2.my.be"
  rules:
    - backendRefs:
        - name: frontend
          port: 80

---
# ─── HTTPRoute: RabbitMQ Management UI ────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rabbitmq-route
  annotations:
    argocd.argoproj.io/sync-wave: "2"  # Sync after RabbitMQ is created, so the service exists
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
      sectionName: https
  hostnames:
    - "dev-rabbitmq.integration-project-2026-groep-2.my.be"
  rules:
    - backendRefs:
        - name: rabbitmq
          port: 15672

---
# ─── HTTPRoute: Billing / Facturatie ──────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: billing-route
  annotations:
    nginx.gateway.networking.k8s.io/auth-type: basic
    nginx.gateway.networking.k8s.io/auth-secret: htpasswd-facturatie
    nginx.gateway.networking.k8s.io/auth-realm: "Facturatie Access (Dev)"
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
      sectionName: https
  hostnames:
    - "dev-facturatie.integration-project-2026-groep-2.my.be"
  rules:
    - backendRefs:
        - name: facturatie
          port: 80

