spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
      sectionName: https
  hostnames:
    - "dev-planning.integration-project-2026-groep-2.my.be"
  rules:
    - backendRefs:
        - name: planning
          port: 80