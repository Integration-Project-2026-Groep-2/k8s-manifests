---
# ─── HTTPRoute: Control Room ──────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: controlroom-route
  annotations:
    argocd.argoproj.io/sync-wave: "2"  # Sync after Kibana is created, so the service exists
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
      sectionName: https
  hostnames:
    - "dev-control-room.integration-project-2026-groep-2.my.be"
  rules:
    - backendRefs:
        - name: kibana-kb-http
          port: 5601
---
# ─── HTTPRoute: Kibana TLS Policy ─────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: BackendTLSPolicy
metadata:
  name: kibana-tls-policy
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: kibana-kb-http
  validation:
    caCertificateRefs:
      - group: ""
        kind: Secret
        name: kibana-kb-http-ca-internal
    hostname: kibana-kb-http.default.svc.cluster.local

---
# ─── HTTPRoute: Planning ──────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
