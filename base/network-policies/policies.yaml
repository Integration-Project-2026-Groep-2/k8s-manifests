---
# ─── Apps exposed through Gateway ────────────────────────────────────────────
# Allow the Gateway controller to reach the public app pods behind HTTPRoutes.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-apps
  namespace: integration-project-2026-groep-2
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - frontend
          - facturatie
          - mailing
          - kassa
          - controlroom
          - planning
          - crm
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: main-gateway

---
# ─── Headlamp egress to Kubernetes API ───────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-headlamp-egress
  namespace: integration-project-2026-groep-2
spec:
  podSelector:
    matchLabels:
      app: headlamp
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP

---
# ─── App egress to RabbitMQ ───────────────────────────────────────────────────
# Label pods that need RabbitMQ access with rabbitmq-client: "true"
# in their deployment template labels (already set above where relevant)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rabbitmq-egress
  namespace: integration-project-2026-groep-2
spec:
  podSelector:
    matchLabels:
      rabbitmq-client: "true"
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: rabbitmq
      ports:
        - port: 5672

---
# ─── CRM egress to Salesforce (internet) ─────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: crm-egress-policy
  namespace: integration-project-2026-groep-2
spec:
  podSelector:
    matchLabels:
      app: crm
  policyTypes:
    - Egress
  egress:
    # RabbitMQ
    - to:
        - podSelector:
            matchLabels:
              app: rabbitmq
      ports:
        - port: 5672
    # Salesforce API (HTTPS to internet)
    - ports:
        - port: 443
          protocol: TCP

