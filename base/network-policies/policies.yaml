# ─── DNS egress (all pods need this) ─────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: integration-project-2026-groep-2
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# ─── RabbitMQ ─────────────────────────────────────────────────────────────────
# Allow all app pods to reach RabbitMQ on AMQP (5672)
# Allow the Gateway controller to reach RabbitMQ management (15672) for the UI
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rabbitmq-ingress-policy
  namespace: integration-project-2026-groep-2
spec:
  podSelector:
    matchLabels:
      app: rabbitmq
  policyTypes:
    - Ingress
  ingress:
    # AMQP from all team services
    - from:
        - podSelector:
            matchLabels:
              rabbitmq-client: "true"
      ports:
        - port: 5672
    # Management UI from Gateway controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: main-gateway
      ports:
        - port: 15672

---
# ─── Elasticsearch ────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: elasticsearch-ingress-policy
  namespace: integration-project-2026-groep-2
spec:
  podSelector:
    matchLabels:
      app: elasticsearch
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: kibana
        - podSelector:
            matchLabels:
              app: controlroom
      ports:
        - port: 9200

---
# ─── Kibana ───────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kibana-ingress-policy
  namespace: integration-project-2026-groep-2
spec:
  podSelector:
    matchLabels:
      app: kibana
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: main-gateway
      ports:
        - port: 5601
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: elasticsearch
      ports:
        - port: 9200

