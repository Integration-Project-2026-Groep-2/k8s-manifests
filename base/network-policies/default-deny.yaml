# Default-deny: no pod can communicate unless explicitly allowed below.
# This replaces the implicit isolation that Docker networks provided.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: integration-project-2026-groep-2
spec:
  podSelector: {}   # Matches ALL pods in the namespace
  policyTypes:
    - Ingress
    - Egress
