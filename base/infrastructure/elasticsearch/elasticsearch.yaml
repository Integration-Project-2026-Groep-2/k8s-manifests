apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: elasticsearch
  annotations:
    argocd.argoproj.io/sync-wave: "1"  # Ensure secrets are applied before this resource
spec:
  version: 8.19.15
  # Wire per-user basic-auth secrets into the cluster.
  auth:
    fileRealm:
      - secretName: kibana-system-basic-auth
      - secretName: svc-controlroom-basic-auth
  nodeSets:
    - name: default
      count: 1
        
      podTemplate:
        spec:
          containers:
            - name: elasticsearch
              resources:
                requests:
                  memory: 1Gi
                  cpu: 250m
                limits:
                  memory: 1Gi
                  cpu: 500m
              # Expose ports from SealedSecret for app consumers
              env:
                - name: PORT_ELASTICSEARCH
                  valueFrom:
                    secretKeyRef:
                      name: elasticsearch-secret
                      key: PORT_ELASTICSEARCH
                - name: ES_JAVA_OPTS
                  value: "-Xms1g -Xmx1g"  # Set JVM heap size to 1Gi for resource efficiency
      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi