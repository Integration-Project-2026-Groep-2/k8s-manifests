apiVersion: kibana.k8s.elastic.co/v1
kind: Kibana
metadata:
  name: kibana
  annotations:
    argocd.argoproj.io/sync-wave: "2"  # Ensure Elasticsearch is ready before this resource
spec:
  version: 8.19.15
  count: 1
  elasticsearchRef:
    name: elasticsearch              # ECK auto-wires connection
  # Inject encryption key into Kibana keystore from SealedSecret
  secureSettings:
    - secretName: elasticsearch-secret
      entries:
        - key: KIBANA_ENCRYPTION_KEY
          path: xpack.encryptedSavedObjects.encryptionKey
  config:
    xpack.encryptedSavedObjects.encryptionKey: ${xpack.encryptedSavedObjects.encryptionKey}
  podTemplate:
    spec:
      containers:
        - name: kibana
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "2Gi"
              cpu: "2"
          env:
            - name: KIBANA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: kibana-system-basic-auth
                  key: username
            - name: KIBANA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kibana-system-basic-auth
                  key: password
            - name: PORT_KIBANA
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-secret
                  key: PORT_KIBANA