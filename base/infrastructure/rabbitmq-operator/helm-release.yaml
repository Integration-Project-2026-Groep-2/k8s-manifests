---
# HelmRepository for RabbitMQ Cluster Operator
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: rabbitmq
  namespace: rabbitmq-system
spec:
  interval: 24h
  url: https://charts.bitnami.com/bitnami

---
# HelmRelease for RabbitMQ Cluster Operator
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rabbitmq-cluster-operator
  namespace: rabbitmq-system
spec:
  interval: 24h
  chart:
    spec:
      chart: rabbitmq-cluster-operator
      sourceRef:
        kind: HelmRepository
        name: rabbitmq
  values:
    useCertManager: true
    certManager:
      enabled: true
      namespace: cert-manager
    operator:
      image:
        repository: pivotalrabbitmq/rabbitmq-cluster-operator
        tag: 1.13.1
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
    rbac:
      create: true
