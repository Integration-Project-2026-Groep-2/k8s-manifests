# RabbitMQ Cluster Operator Helm Values
# Using the official rabbitmq-cluster-operator chart
# Repository: https://github.com/rabbitmq/cluster-operator

useCertManager: true
certManager:
  enabled: true
  namespace: cert-manager

operator:
  image:
    repository: pivotalrabbitmq/rabbitmq-cluster-operator
    tag: 1.13.1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# RBAC settings
rbac:
  create: true
