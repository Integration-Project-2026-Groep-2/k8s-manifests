---
# RabbitmqCluster Custom Resource
# Defines a RabbitMQ cluster using the Cluster Operator
apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
metadata:
  name: rabbitmq
  namespace: integration-project-2026-groep-2
  labels:
    app: rabbitmq
  annotations:
    argocd.argoproj.io/sync-wave: "1"  # Sync before applications
spec:
  # Number of RabbitMQ nodes
  replicas: 1

  # Image configuration
  image: rabbitmq:4-management

  # Service configuration
  service:
    type: ClusterIP

  # Resource management
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  # Persistence configuration
  persistence:
    storage: 5Gi
    storageClassName: hostpath

  # RabbitMQ configuration
  rabbitmq:
    # Additional configuration can be added here
    additionalConfig: |
      management.load_definitions = /etc/rabbitmq/definitions.json
      # Enable management plugin
      management.tcp.port = 15672

  # Override default user
  override:
    statefulSet:
      spec:
        template:
          spec:
            containers:
            - name: rabbitmq
              env:
              - name: RABBITMQ_DEFAULT_USER
                valueFrom:
                  secretKeyRef:
                    name: rabbitmq-default-user
                    key: username
              - name: RABBITMQ_DEFAULT_PASS
                valueFrom:
                  secretKeyRef:
                    name: rabbitmq-default-user
                    key: password
              # Additional environment variables from your existing setup
              - name: RABBITMQ_DEFAULT_VHOST
                valueFrom:
                  secretKeyRef:
                    name: rabbitmq-secret
                    key: RABBITMQ_VHOST
              - name: RABBITMQ_MANAGEMENT_PREFIX
                valueFrom:
                  secretKeyRef:
                    name: rabbitmq-secret
                    key: RABBITMQ_MANAGEMENT_PREFIX
              volumeMounts:
                - name: rabbitmq-definitions
                  mountPath: /etc/rabbitmq/definitions.json
                  subPath: definitions.json
            volumes:
              - name: rabbitmq-definitions
                configMap:
                  name: rabbitmq-definitions

  # Affinity rules for pod distribution
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
              - rabbitmq
          topologyKey: kubernetes.io/hostname

  # Termination grace period
  terminationGracePeriodSeconds: 604800  # 7 days for graceful shutdown