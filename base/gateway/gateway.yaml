# Kubernetes Gateway API - Shared GatewayClass
# Environment-specific Gateway and HTTPRoutes are in overlays/dev and overlays/prod

# Prerequisites: Gateway API CRDs and Gateway Controller (e.g., NGINX Gateway Controller)
# Install with:
#   helm install nginx-gateway nginx-gateway/nginx-gateway \
#     --namespace nginx-gateway --create-namespace \
#     -f gateway/gateway-controller-values.yaml

---
# ─── GatewayClass (shared across all environments) ─────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: nginx
spec:
  controllerName: gateway.nginx.org/nginx-gateway-controller
