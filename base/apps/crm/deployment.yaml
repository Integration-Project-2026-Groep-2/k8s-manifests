apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm
  namespace: integration-project-2026-groep-2
  labels:
    app: crm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crm
  template:
    metadata:
      labels:
        rabbitmq-client: "true"
        app: crm
    spec:
      securityContext: {}
      containers:
        - name: crm
          image: ghcr.io/integration-project-2026-groep-2/crm:latest-dev
          ports:
            - containerPort: 8080   # UPDATE to actual port
          env:
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_PASS
            - name: RABBITMQ_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASS)@rabbitmq:5672/"
            - name: SALESFORCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: crm-secret
                  key: SF_USER
            - name: SALESFORCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: crm-secret
                  key: SF_PASS
            - name: SALESFORCE_SECURITY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: crm-secret
                  key: SF_TOKEN
            - name: SALESFORCE_DOMAIN
              value: login
            - name: LOG_LEVEL
              value: INFO
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health   # UPDATE to actual health endpoint
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: crm
  namespace: integration-project-2026-groep-2
  labels:
    app: crm
spec:
  type: ClusterIP
  selector:
    app: crm
  ports:
    - name: http
      port: 80
      targetPort: 8080   # UPDATE to actual port
