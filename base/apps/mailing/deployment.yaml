apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailing
  namespace: integration-project-2026-groep-2
  labels:
    app: mailing
  annotations:
    argocd.argoproj.io/sync-wave: "3"  # Sync after databases and infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailing
  template:
    metadata:
      labels:
        rabbitmq-client: "true"
        app: mailing
    spec:
      securityContext: {}
      containers:
        - name: mailing
          image: ghcr.io/integration-project-2026-groep-2/mailing:latest-dev
          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              value: mailing-db
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_AMQP_PORT
              value: "5672"
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: MAILING_RABBITMQ_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: MAILING_RABBITMQ_PASS
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: mailing-secret
                  key: MAILING_DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mailing-secret
                  key: MAILING_DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mailing-secret
                  key: MAILING_DB_PASS
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mailing-secret
                  key: SENDGRID_API_KEY
            - name: SENDGRID_FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: mailing-secret
                  key: SENDGRID_FROM_EMAIL
            - name: SENDGRID_USER_CONFIRMED_TEMPLATE_ID
              valueFrom:
                secretKeyRef:
                  name: mailing-secret
                  key: SENDGRID_USER_CONFIRMED_TEMPLATE_ID
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: mailing
  namespace: integration-project-2026-groep-2
  labels:
    app: mailing
spec:
  type: ClusterIP
  selector:
    app: mailing
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mailing-db
  namespace: integration-project-2026-groep-2
  labels:
    app: mailing-db
  annotations:
    argocd.argoproj.io/sync-wave: "2"  # Sync before applications, after infrastructure
spec:
  serviceName: mailing-db
  replicas: 1
  selector:
    matchLabels:
      app: mailing-db
  template:
    metadata:
      labels:
        app: mailing-db
    spec:
      securityContext:
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: mailing-db
          image: mariadb:11.8
          ports:
            - containerPort: 3306
          env:
            - name: MARIADB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mailing-secret
                  key: MAILING_DB_NAME
            - name: MARIADB_USER
              valueFrom:
                secretKeyRef:
                  name: mailing-secret
                  key: MAILING_DB_USER
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mailing-secret
                  key: MAILING_DB_PASS
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mailing-secret
                  key: MAILING_DB_ROOT_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command: ["healthcheck.sh", "--connect", "--innodb_initialized"]
            initialDelaySeconds: 25
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["healthcheck.sh", "--connect"]
            initialDelaySeconds: 35
            periodSeconds: 30
          volumeMounts:
            - name: mailing-db-data
              mountPath: /var/lib/mysql
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
        - name: init-scripts
          configMap:
            name: mailing-db-init   # Create a ConfigMap from ./mailing/docker/db/init/
  volumeClaimTemplates:
    - metadata:
        name: mailing-db-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mailing-db
  namespace: integration-project-2026-groep-2
  labels:
    app: mailing-db
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: mailing-db
  ports:
    - port: 3306
      targetPort: 3306
