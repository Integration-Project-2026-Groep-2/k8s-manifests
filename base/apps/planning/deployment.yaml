apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: planning-db
  namespace: integration-project-2026-groep-2
  labels:
    app: planning-db
  annotations:
    argocd.argoproj.io/sync-wave: "2"  # Sync before applications, after infrastructure
spec:
  serviceName: planning-db
  replicas: 1
  selector:
    matchLabels:
      app: planning-db
  template:
    metadata:
      labels:
        rabbitmq-client: "true"
        app: planning-db
    spec:
      securityContext:
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: planning-db
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: planning-secret
                  key: PLANNING_DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: planning-secret
                  key: PLANNING_DB_PASSWORD
            - name: POSTGRES_DB
              value: planning_db
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: planning-db-data
              mountPath: /var/lib/postgresql
  volumeClaimTemplates:
    - metadata:
        name: planning-db-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: hostpath
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: planning-db
  namespace: integration-project-2026-groep-2
  labels:
    app: planning-db
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: planning-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: planning
  namespace: integration-project-2026-groep-2
  labels:
    app: planning
  annotations:
    argocd.argoproj.io/sync-wave: "3"  # Sync after databases and infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: planning
  template:
    metadata:
      labels:
        app: planning
    spec:
      securityContext: {}
      containers:
        - name: planning
          image: ghcr.io/integration-project-2026-groep-2/planning:latest-dev
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: DB_HOST
              value: planning-db
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: planning-secret
                  key: PLANNING_DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: planning-secret
                  key: PLANNING_DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: planning-secret
                  key: PLANNING_DB_PASSWORD
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: PLANNING_RABBITMQ_USER
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: PLANNING_RABBITMQ_PASS
            - name: RABBITMQ_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASS)@rabbitmq:5672"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health   # UPDATE to actual health endpoint
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: planning
  namespace: integration-project-2026-groep-2
  labels:
    app: planning
spec:
  type: ClusterIP
  selector:
    app: planning
  ports:
    - name: http
      port: 80
      targetPort: 3000
